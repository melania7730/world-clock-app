<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock</title>
  </head>

  <body>
    <div class="container">
      <h1>🌍 World Clock</h1>

      <select id="city">
        <option value="">Select a city...</option>
        <option value="Europe/London">London</option>
        <option value="America/New_York">New York</option>
        <option value="Pacific/Auckland">Auckland</option>
      </select>

      <div class="city">
        <div>
          <h2>Los Angeles 🇺🇸</h2>
          <div class="date">August 15th 2022</div>
        </div>

        <div class="time">1:48:15 <small>AM</small></div>
      </div>

      <div class="city">
        <div>
          <h2>Paris 🇫🇷</h2>
          <div class="date">August 15th 2022</div>
        </div>

        <div class="time">1:48:15 <small>AM</small></div>
      </div>
    </div>

    <footer>
      <footer>
        This project was coded by <strong>Melania Tampubolon</strong>, is
        <a href="https://github.com/melania7730/world-clock-app" target="_blank"
          >open sourced on GitHub</a
        >
        and hosted on
        <a href="https://world-clock-by-mel.netlify.app/" target="_blank"
          >Netlify</a
        >.
      </footer>
    </footer>

    <script src="javascript/index.js"></script>
  </body>
</html>
